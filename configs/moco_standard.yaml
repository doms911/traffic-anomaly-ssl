experiment_name: moco_standard
description: "MoCo v2 SSL pretraining on Cityscapes-Sequence (image-level pairs)"

model:
  encoder: resnet50
  proj_dim: 128
  queue_size: 65536
  momentum: 0.99
  temperature: 0.2
  encoder_weights: imagenet

dataset:
  mode: image
  num_workers: 16
  pin_memory: true

augmentations:
  crop_size: 224

training:
  batch_size: 256
  num_epochs: 100
  learning_rate: 0.015
  sgd_momentum: 0.9
  weight_decay: 0.0001
  mixed_precision: true

logging:
  log_every_n_steps: 50
  save_every_n_epochs: 20