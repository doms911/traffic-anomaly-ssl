experiment_name: baseline_smoke
description: "Smoke test - 2 epochs, small crop"

model:
  architecture: deeplabv3plus
  encoder: resnet50
  encoder_weights: imagenet
  num_classes: 19

dataset:
  name: cityscapes
  num_workers: 4
  pin_memory: true

augmentations:
  crop_size: [768, 768]
  horizontal_flip_prob: 0.5
  color_jitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4

training:
  batch_size: 8
  num_epochs: 2
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: poly
  poly_power: 0.9
  ignore_index: 255
  mixed_precision: true

logging:
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_every_n_epochs: 1
  use_wandb: false
  use_tensorboard: true