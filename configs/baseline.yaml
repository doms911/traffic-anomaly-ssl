# Eksperiment metadata
experiment_name: baseline_imagenet
description: "DeepLabV3+ with ImageNet pretrained ResNet50 backbone"

# Model
model:
  architecture: deeplabv3plus
  encoder: resnet50
  encoder_weights: imagenet  # ili null za random init, ili path do SSL checkpointa
  num_classes: 19

# Dataset
dataset:
  name: cityscapes
  num_workers: 8
  pin_memory: true

# Augmentations
augmentations:
  crop_size: [768, 768]
  horizontal_flip_prob: 0.5
  color_jitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.4

# Training
training:
  batch_size: 8
  num_epochs: 200
  optimizer: sgd
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: poly
  poly_power: 0.9
  ignore_index: 255
  mixed_precision: true

# Logging
logging:
  log_every_n_steps: 50
  val_every_n_epochs: 5
  save_every_n_epochs: 20
  use_wandb: false
  use_tensorboard: true